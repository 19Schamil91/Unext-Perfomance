# .codex/config.toml
# Projekt-lokale Codex-Konfiguration.
# Diese Datei gehört ins Repository und wird mit eingecheckt.
#
# Ollama als lokaler Modell-Provider für Subagents:
# - `ollama` ist in Codex als Built-in-Provider bereits registriert
#   mit dem Default-Endpunkt http://localhost:11434/v1.
# - Wir müssen den Provider daher NICHT explizit definieren.
# - Die drei Subagents referenzieren ihn direkt über
#   `model_provider = "ollama"` in ihren jeweiligen .toml-Dateien.
#
# Voraussetzungen (Runtime, nicht in dieser Datei konfiguriert):
# - Ollama installiert (https://ollama.com)
# - Ollama läuft (`ollama serve`, meist automatisch als Dienst)
# - Modelle geladen:
#     ollama pull qwen2.5-coder:3b
#     ollama pull qwen2.5-coder:7b